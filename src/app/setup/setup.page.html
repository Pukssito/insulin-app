<ion-header class="ion-no-border">
  <ion-toolbar mode="ios">
    <ion-title>Tu Insulina</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="setup-header">
    <h1>Configuración</h1>
    <p>Selecciona las marcas de insulina que utilizas habitualmente.</p>
  </div>

  <ion-segment [(ngModel)]="tab" mode="ios" class="custom-segment">
    <ion-segment-button value="pen" layout="icon-top">
      <span class="seg-glyph">✎</span>
      <ion-label>Plumas</ion-label>
    </ion-segment-button>
    <ion-segment-button value="vial" layout="icon-top">
      <span class="seg-glyph">⚗</span>
      <ion-label>Viales</ion-label>
    </ion-segment-button>
  </ion-segment>

  <ion-searchbar [(ngModel)]="q" 
                 placeholder="Buscar marca..." 
                 mode="ios" 
                 class="custom-searchbar"></ion-searchbar>

  <div class="insulin-grid">
    <div *ngFor="let b of listForTab()" 
         [class]="'insulin-card ' + b.class" 
         [ngClass]="{'is-selected': selected.has(b.id)}"
         (click)="toggle(b.id)">
      
      <div class="card-selection-indicator">
        <span class="sel-glyph">{{ selected.has(b.id) ? '✓' : '＋' }}</span>
      </div>

      <div class="card-body">
        <div class="brand-name">{{ b.tradeName }}</div>
        <div class="brand-info">
          <ion-badge slot="start">{{ b.class }}</ion-badge>
          <span>{{ b.speed }}</span>
        </div>
        <div class="brand-notes" *ngIf="b.notes">{{ b.notes }}</div>
      </div>
    </div>
  </div>

  <div class="fixed-footer">
    <ion-button expand="block"
                [disabled]="selected.size===0"
                (click)="save()"
                class="save-btn shadow-btn">
      Guardar y continuar
      <span class="arrow-glyph" slot="end">→</span>
    </ion-button>
  </div>
</ion-content>
