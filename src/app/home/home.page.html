<ion-header class="ion-no-border">
  <ion-toolbar mode="ios">
    <ion-buttons slot="start">
      <ion-button (click)="goSetup()" fill="clear" class="header-pill config-pill">
        <span class="pill-glyph" slot="start">⚙</span>
        <span class="pill-label">Configuración</span>
      </ion-button>
    </ion-buttons>
    <ion-title class="header-title">Insulina Diario</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="confirmResetAll()" fill="clear" class="header-pill trash-pill" aria-label="Borrar todo el día">
        <span class="trash-glyph">🗑</span>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <!-- Tarjeta de Fecha Hoy (con acceso al historial) -->
  <div class="header-section" (click)="goHistory()">
    <div class="header-flex">
      <div class="header-text">
        <h2 class="day-title">Hoy</h2>
        <p class="date-subtitle">{{ today | date: 'EEEE, d MMMM yyyy' }}</p>
      </div>
      <div class="header-right" (click)="$event.stopPropagation()">
        <app-completion-ring
          *ngIf="daySummary.basalExpected > 0"
          [done]="daySummary.basalDone"
          [expected]="daySummary.basalExpected">
        </app-completion-ring>
        <div class="history-pill" (click)="goHistory()">
          <span class="cal-glyph">📅</span>
          <span>Historial</span>
        </div>
      </div>
    </div>
    <div class="summary-row" *ngIf="daySummary.basalExpected > 0 || daySummary.totalBolus > 0 || daySummary.avgGlucose">
      <app-summary-chips
        [totalBolus]="daySummary.totalBolus"
        [avgGlucose]="daySummary.avgGlucose">
      </app-summary-chips>
    </div>
  </div>

  <!-- Franjas de Insulina -->
  <div class="slots-container">
    <app-slot-card
      *ngFor="let s of slots"
      [slot]="s"
      [today]="today"
      [isMissed]="missed.includes(s.id)"
      (toggleBasal)="onToggleBasal(s)"
      (addBolus)="onAddBolus(s, $event)"
      (removeLastBolus)="onRemoveLastBolus(s)"
      (addNote)="onAddNote(s, $event)"
      (reset)="confirmResetSlot(s)">
    </app-slot-card>
  </div>

</ion-content>
